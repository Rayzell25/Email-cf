# Cloudflare Email Manager bot stack.
#   - telegram-bot-api : self-hosted Local Bot API server (fast responses +
#                        newest Bot API features e.g. premium emoji on buttons)
#   - redis            : FSM session cache (fast, survives bot restarts)
#   - bot              : the Python/aiogram bot
#
# Usage:
#   cp .env.example .env   # then fill in the values
#   docker compose pull && docker compose up -d
#
# NOTE: telegram-bot-api MUST be a recent image (9.4+) for icon_custom_emoji_id.

services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: cf-email-bot-api
    restart: always
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_LOCAL=1
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    networks:
      - botnet
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: cf-email-redis
    restart: always
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    volumes:
      - redis-data:/data
    networks:
      - botnet

  bot:
    build: .
    image: cloudflare-email-bot:latest
    container_name: cf-email-bot
    restart: always
    depends_on:
      - telegram-bot-api
      - redis
    env_file:
      - .env
    environment:
      # Container-internal overrides (point at the compose services).
      - BOT_API_ROOT=http://telegram-bot-api:8081
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite+aiosqlite:///data/bot.db
    volumes:
      - ./data:/app/data
    networks:
      - botnet
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  botnet:
    name: cf-email-botnet

volumes:
  telegram-bot-api-data:
    name: cf-email-telegram-bot-api-data
  redis-data:
    name: cf-email-redis-data
